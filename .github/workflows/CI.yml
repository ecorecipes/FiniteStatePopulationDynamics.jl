name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1'
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        arch:
          - x64
    steps:
      - name: Checkout FiniteStatePopulationDynamics.jl
        uses: actions/checkout@v4
        with:
          path: FiniteStatePopulationDynamics.jl
      - name: Checkout ProjectionModels.jl
        uses: actions/checkout@v4
        with:
          repository: ecorecipes/ProjectionModels.jl
          path: ProjectionModels.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
        with:
          cache-compiled: 'true'
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: FiniteStatePopulationDynamics.jl
      - uses: julia-actions/julia-runtest@v1
        with:
          project: FiniteStatePopulationDynamics.jl
